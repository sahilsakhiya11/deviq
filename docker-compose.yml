services:
  deviq-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: deviq-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/ingestion:/app/backend/ingestion

  deviq-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        # For local Docker Compose, frontend uses /api which Nginx proxies to backend
        # For production, override: docker build --build-arg VITE_API_BASE_URL=https://backend-url
        VITE_API_BASE_URL: /api
    container_name: deviq-frontend
    ports:
      - "80:80"
    depends_on:
      - deviq-api